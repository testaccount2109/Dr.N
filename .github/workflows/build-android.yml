name: Build Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - '**.md'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24'
          channel: 'stable'

      # ── Go Library ──────────────────────────────────────────────
      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Fetch Go dependencies
        run: |
          cd go/core
          go mod tidy
          go get golang.org/x/mobile@latest

      - name: Build Go library for Android (aar)
        run: |
          mkdir -p flutter_app/android/app/libs
          cd go/core
          gomobile bind -v -target=android -androidapi 21 \
            -o ../../flutter_app/android/app/libs/drn.aar \
            github.com/b3nni/drn/core/drnbind

      # ── Flutter Project ─────────────────────────────────────────
      - name: Generate Flutter project
        run: |
          cd /tmp
          flutter create --org com.drn --project-name drn_app --platforms android temp_drn
          # Keep the generated Android project but overlay our files
          cp -r temp_drn/android/* ${{ github.workspace }}/flutter_app/android/
          cp temp_drn/analysis_options.yaml ${{ github.workspace }}/flutter_app/
          # Remove generated MainActivity (we have our own with bridge)
          rm -f ${{ github.workspace }}/flutter_app/android/app/src/main/kotlin/com/drn/app/MainActivity.kt
          # Make sure our custom Kotlin files directory exists
          mkdir -p ${{ github.workspace }}/flutter_app/android/app/src/main/java/com/drn/app
          # Add aar dependency to generated build.gradle
          cat >> ${{ github.workspace }}/flutter_app/android/app/build.gradle << 'DEOF'

          android {
              buildTypes {
                  release {
                      debuggable false
                  }
              }
          }

          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.jar', '*.aar'])
          }
          DEOF

      - name: Get Flutter packages
        working-directory: flutter_app
        run: flutter pub get

      # ── Build ───────────────────────────────────────────────────
      - name: Build Android APK (debug)
        working-directory: flutter_app
        run: flutter build apk --debug

      - name: Rename APK
        run: |
          cp flutter_app/build/app/outputs/flutter-apk/app-debug.apk \
             Dr.N-v1.0.0-android.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dr.N-Android-APK
          path: Dr.N-v1.0.0-android.apk
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: "v1.0.0-android"
          name: "Dr.N v1.0.0 – Android"
          files: Dr.N-v1.0.0-android.apk
          generate_release_notes: false
          make_latest: false