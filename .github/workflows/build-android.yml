name: Build Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - '**.md'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24'
          channel: 'stable'

      # ── Go Library ──────────────────────────────────────────────
      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Fetch Go dependencies
        run: |
          cd go/core
          go mod tidy
          go get golang.org/x/mobile@latest

      - name: Build Go library for Android (aar)
        run: |
          mkdir -p flutter_app/android/app/libs
          cd go/core
          gomobile bind -v -target=android -androidapi 21 \
            -o ../../flutter_app/android/app/libs/drn.aar \
            github.com/b3nni/drn/core/drnbind

      # ── Flutter Project ─────────────────────────────────────────
      - name: Generate Flutter project
        run: |
          cd /tmp
          flutter create --org com.drn --project-name drn_app --platforms android temp_drn
          # Save our custom files before replacing android/
          OUR_KT="${{ github.workspace }}/flutter_app/android/app/src/main/kotlin/com/drn/app"
          OUR_LIBS="${{ github.workspace }}/flutter_app/android/app/libs"
          # Copy our custom .kt files to temp
          mkdir -p /tmp/drn_kt
          if [ -d "$OUR_KT" ]; then
            cp -v "$OUR_KT"/*.kt /tmp/drn_kt/ 2>/dev/null || echo "No .kt files to backup"
          fi
          # Copy drn.aar to temp
          mkdir -p /tmp/drn_libs
          if [ -f "$OUR_LIBS/drn.aar" ]; then
            cp -v "$OUR_LIBS/drn.aar" /tmp/drn_libs/
          else
            echo "WARNING: drn.aar not found at $OUR_LIBS/drn.aar"
          fi
          # Now replace android/ with generated version
          rm -rf "${{ github.workspace }}/flutter_app/android/"
          cp -r temp_drn/android "${{ github.workspace }}/flutter_app/android"
          cp temp_drn/analysis_options.yaml "${{ github.workspace }}/flutter_app/"
          # Restore our custom .kt files
          mkdir -p "$OUR_KT"
          if ls /tmp/drn_kt/*.kt 1>/dev/null 2>&1; then
            cp -v /tmp/drn_kt/*.kt "$OUR_KT/"
            echo "Restored .kt files: $(ls $OUR_KT/*.kt)"
          else
            echo "ERROR: No backup .kt files found to restore!"
            ls -la /tmp/drn_kt/ || true
          fi
          # Restore drn.aar
          mkdir -p "$OUR_LIBS"
          if [ -f /tmp/drn_libs/drn.aar ]; then
            cp -v /tmp/drn_libs/drn.aar "$OUR_LIBS/"
            echo "Restored drn.aar ($(ls -lh $OUR_LIBS/drn.aar | awk '{print $5}'))"
          else
            echo "ERROR: drn.aar backup not found!"
          fi
          # Add aar dependency to generated build.gradle
          cat >> ${{ github.workspace }}/flutter_app/android/app/build.gradle << 'DEOF'

          android {
              buildTypes {
                  release {
                      debuggable false
                  }
              }
          }

          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.jar', '*.aar'])
          }
          DEOF

      - name: Get Flutter packages
        working-directory: flutter_app
        run: flutter pub get

      # ── Build ───────────────────────────────────────────────────
      - name: Build Android APK (debug)
        working-directory: flutter_app
        run: flutter build apk --debug

      - name: Rename APK
        run: |
          cp flutter_app/build/app/outputs/flutter-apk/app-debug.apk \
             Dr.N-v1.0.0-android.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dr.N-Android-APK
          path: Dr.N-v1.0.0-android.apk
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: "v1.0.0-android"
          name: "Dr.N v1.0.0 – Android"
          files: Dr.N-v1.0.0-android.apk
          generate_release_notes: false
          make_latest: false